<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Bot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #25D366; --dark: #128C7E; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; }
        nav { width: 250px; background: #fff; height: 100vh; border-right: 1px solid #ddd; padding: 20px; }
        nav h2 { color: var(--dark); margin-bottom: 30px; }
        nav a { display: block; padding: 12px; color: #333; text-decoration: none; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        nav a:hover, nav a.active { background: var(--primary); color: white; }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; padding: 15px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background: var(--dark); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .pending { background: #fff3cd; color: #856404; }
        .completed { background: #d4edda; color: #155724; }
        .btn-delete { color: #dc3545; cursor: pointer; border: none; background: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <nav>
        <h2><i class="fab fa-whatsapp"></i> WA Admin</h2>
        <a href="#" onclick="showPage('create')" id="link-create" class="active"><i class="fas fa-plus"></i> Create Task</a>
        <a href="#" onclick="showPage('manage')" id="link-manage"><i class="fas fa-tasks"></i> Manage Tasks</a>
<a href="#" onclick="showPage('contacts')" id="link-contacts"><i class="fas fa-address-book"></i> Groups & Contacts</a>
    </nav>

    <main>
        <section id="page-create">
            <div class="card">
                <h3>Schedule New Automation</h3>
                <div class="form-group">
                    <label>Task Type</label>
                    <select id="taskType">
                        <option value="single">Single Chat / Group</option>
                        <option value="group_members">All Members in a Group</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Target JID</label>
                    <input type="text" id="targetId" placeholder="e.g. 123456789@s.whatsapp.net or group-id@g.us">
                </div>
                <div class="form-group">
                    <label>Media Type</label>
                    <select id="mediaType">
                        <option value="text">Text Only</option>
                        <option value="image">Image</option>
                        <option value="video">Video</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Media URL / Path (Optional)</label>
                    <input type="text" id="mediaUrl" placeholder="http://... or ./media/file.jpg">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" rows="4"></textarea>
                </div>
                <div style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Day</label>
                        <select id="day">
                            <option value="0">Sunday</option><option value="1">Monday</option><option value="2">Tuesday</option>
                            <option value="3">Wednesday</option><option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Time</label>
                        <input type="time" id="time">
                    </div>
                </div>
                <button onclick="saveTask()">Create Automation Task</button>
            </div>
        </section>

        <section id="page-manage" class="hidden">
            <div class="card">
                <h3>Automation Queue</h3>
                <table id="taskTable">
                    <thead>
                        <tr>
                            <th>Target</th>
                            <th>Type</th>
                            <th>Schedule</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="taskBody"></tbody>
                </table>
            </div>
        </section>

        <section id="page-contacts" class="hidden">
    <div class="card">
        <h3>WhatsApp Groups</h3>
        <table id="groupTable">
            <thead><tr><th>Name</th><th>ID</th><th>Members</th></tr></thead>
            <tbody id="groupBody"></tbody>
        </table>
    </div>
    <div class="card" style="margin-top: 20px;">
        <h3>Contacts</h3>
        <table id="contactTable">
            <thead><tr><th>Name</th><th>ID</th></tr></thead>
            <tbody id="contactBody"></tbody>
        </table>
    </div>
</section>
    </main>

    <script>
        function showPage(page) {
            document.getElementById('page-create').classList.toggle('hidden', page !== 'create');
            document.getElementById('page-manage').classList.toggle('hidden', page !== 'manage');
            document.getElementById('link-create').classList.toggle('active', page === 'create');
            document.getElementById('link-manage').classList.toggle('active', page === 'manage');
            document.getElementById('page-contacts').classList.toggle('hidden', page !== 'contacts');
            if(page === 'manage') fetchTasks();
            if(page === 'contacts') fetchNetwork();
        }

        async function saveTask() {
            const data = {
                taskType: document.getElementById('taskType').value,
                targetId: document.getElementById('targetId').value,
                mediaType: document.getElementById('mediaType').value,
                mediaUrl: document.getElementById('mediaUrl').value,
                message: document.getElementById('message').value,
                day: parseInt(document.getElementById('day').value),
                time: document.getElementById('time').value
            };
            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert('Task Scheduled Successfully!');
            showPage('manage');
        }

        async function fetchTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            const body = document.getElementById('taskBody');
            body.innerHTML = tasks.map(t => `
                <tr>
                    <td>${t.targetId || 'All Contacts'}</td>
                    <td>${t.mediaType}</td>
                    <td>Day ${t.day} @ ${t.time}</td>
                    <td><span class="badge ${t.status}">${t.status}</span></td>
                    <td><button class="btn-delete" onclick="deleteTask('${t._id}')"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
        }

        async function deleteTask(id) {
            if(confirm('Delete this task?')) {
                await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
                fetchTasks();
            }
        }

async function fetchNetwork() {
    // Fetch Groups
    const groupRes = await fetch('/api/chats');
    const groups = await groupRes.json();
    document.getElementById('groupBody').innerHTML = groups.map(g => `
        <tr><td>${g.name}</td><td>${g.id}</td><td>${g.members}</td></tr>
    `).join('');

    // Fetch Contacts
    const contactRes = await fetch('/api/contacts');
    const contacts = await contactRes.json();
    document.getElementById('contactBody').innerHTML = contacts.map(c => `
        <tr><td>${c.name || 'Unknown'}</td><td>${c._id}</td></tr>
    `).join('');
}
    </script>
</body>
</html>
